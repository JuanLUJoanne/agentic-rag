name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e . && pip install pytest pytest-asyncio ruff

      - name: Lint with ruff
        run: ruff check src/ tests/
        continue-on-error: false

      - name: Run unit tests
        env:
          # No real API key — DummyLLM handles all LLM calls in CI
          OPENAI_API_KEY: sk-test-placeholder
        run: pytest tests/unit/ -v --tb=short
